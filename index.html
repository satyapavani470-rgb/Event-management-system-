<!DOCTYPE html>
<html>
<head>
    <title>Event Management System</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
        }

        .page{
            display:none;
            padding:50px;
        }

        .active{
            display:block;
        }

        button{
            padding:10px 20px;
            margin:10px;
            cursor:pointer;
        }
    </style>
</head>
<body>

    <!-- Title Page -->
    <div id="page1" class="page active">
        <h1>Event Management System</h1>
        <p>Welcome to our Event Portal</p>
        <button onclick="showPage('page2')">View Events</button>
    </div>

    <!-- Event Page -->
    <div id="page2" class="page">
        <h1>Upcoming Events</h1>

        <h3>Hackathon 2026</h3>
        <button onclick="showPage('page3')">Register</button>

        <h3>Technical Workshop</h3>
        <button onclick="showPage('page3')">Register</button>

        <br><br>
        <button onclick="showPage('page1')">Back</button>
    </div>

    <!-- Registration Page -->
    <div id="page3" class="page">
        <h1>Registration Form</h1>

        <form id="form">
            <input type="text" placeholder="Name" required><br><br>
            <input type="email" placeholder="Email" required><br><br>

            <button type="submit">Submit</button>
        </form>

        <p id="msg"></p>

        <button onclick="showPage('page2')">Back</button>
    </div>

    <script>
        function showPage(pageId){

            let pages = document.querySelectorAll('.page');

            pages.forEach(page=>{
                page.classList.remove('active');
            });

            document.getElementById(pageId)
                    .classList.add('active');
        }

        document.getElementById('form')
        .addEventListener('submit', function(e){

            e.preventDefault();

            document.getElementById('msg').innerHTML =
                "Registration Successful!";
        });
    </script>

</body>
</html>
